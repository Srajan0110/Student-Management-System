<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            min-height: 100vh;
        }

        .form-card {
            background-color: #1e293b;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0px 0px 25px rgba(59, 130, 246, 0.3);
        }

        .page-title {
            color: white;
            font-weight: bold;
        }

        label {
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-control,
        .form-select {
            background-color: #334155;
            border: none;
            color: white;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #334155;
            color: white;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .back-btn {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <a href="/" class="btn btn-outline-light back-btn">
            ← Back To Dashboard
        </a>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <div class="row justify-content-center">

            <div class="col-md-8">

                <div class="form-card">

                    <h2 class="page-title text-center mb-4">
                        Add New Student
                    </h2>

                    <form action="/add_student" method="POST">

                        <div class="mb-3">
                            <label>Student Name</label>
                            <input type="text"
                                   name="name"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Phone</label>
                            <input type="tel"
                                   name="phone"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Age</label>
                            <input type="number"
                                   name="age"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label>Course</label>
                            <input type="text"
                                   name="course"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label>Gender</label>

                            <select name="gender"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Select Gender
                                </option>

                                <option value="Male">
                                    Male
                                </option>

                                <option value="Female">
                                    Female
                                </option>

                                <option value="Other">
                                    Other
                                </option>

                            </select>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            Save Student
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
